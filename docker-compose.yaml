services:
  backend:
    image: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: 
      - ./backend/.env
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/status || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    image: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: 
      - ./frontend/.env
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:18.1-alpine3.23
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]      
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:8.4.0
    container_name: redis
    hostname: redis
    restart: always
    ports:
      - "6379:6379"
    env_file: 
      - ./.env
    command: ["redis-server", "--requirepass", "${REDIS_PASS}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASS} ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 4
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data


volumes:
  db_data:
  redis_data:
  kafka_data:
